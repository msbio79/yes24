name: YES24 매일 크롤링

on:
  schedule:
    - cron: '0 21 * * *' # 한국 시간 오전 6시 (UTC 21:00)
  workflow_dispatch:      # <--- 이게 있어야 '수동 실행' 버튼이 생깁니다!

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: 파이썬 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 라이브러리 설치
        run: |
          pip install -r requirements.txt

      - name: 크롤링 실행
        run: python crawler.py

      - name: 변경사항 저장 (GitHub Push)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "데이터 업데이트: $(date)" || echo "변경사항 없음"
          git push
